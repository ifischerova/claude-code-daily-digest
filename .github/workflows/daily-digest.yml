name: Daily Claude Code Digest

on:
  schedule:
    - cron: "0 5 * * *"  # 06:00 (CET) / 07:00 (CEST) Europe/Prague
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate and send digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'google/gemini-3.1-flash-lite' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ vars.MAIL_FROM || 'onboarding@resend.dev' }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python -m src.main

      - name: Commit new digest
        # Always run: if README update failed (non-zero exit) the archive was
        # still written, and committing it is what prevents a duplicate email
        # on the next run. If the send failed, nothing was archived and this is
        # a no-op.
        if: always()
        run: |
          git config user.name "Iva Fischerova"
          git config user.email "fischerova.ivka@gmail.com"
          git add digests README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily digest $(date +%F)"
            git push
          fi
